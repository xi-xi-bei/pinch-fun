<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>捏捏乐</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a12;font-family:-apple-system,sans-serif;color:#e0e0e0;touch-action:none;user-select:none}
#gameCanvas{position:absolute;top:0;left:0;width:100%;height:100%}
#camWin{position:absolute;top:12px;right:12px;width:200px;height:150px;border-radius:10px;overflow:hidden;border:2px solid rgba(0,255,136,.35);background:#000;z-index:50;opacity:.92;transition:opacity .3s}
#camWin canvas{display:block;width:100%;height:100%}
#hud{position:absolute;top:12px;left:16px;z-index:100;pointer-events:none;display:flex;flex-direction:column;gap:6px}
.hud-card{background:rgba(0,0,0,.55);backdrop-filter:blur(8px);border-radius:8px;padding:6px 14px;font-size:14px;font-weight:600;display:inline-block;width:fit-content}
.hud-score{color:#FFD700}.hud-combo{color:#FF6B6B}.hud-timer{color:#00FF88}.hud-best{color:#AAA;font-size:11px;font-weight:400}
#overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.82);backdrop-filter:blur(10px);z-index:200;transition:opacity .4s}
#overlay.hidden{opacity:0;pointer-events:none}
#overlay .title{font-size:48px;font-weight:800;letter-spacing:.02em}
#overlay .sub{font-size:15px;color:#aaa;margin:12px 0 24px;text-align:center;line-height:1.6;max-width:360px}
#overlay .btn{padding:14px 40px;border:none;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;background:#00FF88;color:#0a0a12;box-shadow:0 0 28px rgba(0,255,136,.35);transition:transform .15s}
#overlay .btn:hover{transform:scale(1.06)}
#overlay .final-score{font-size:36px;font-weight:800;color:#FFD700;margin-bottom:4px}

#hintPanel{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);z-index:100;pointer-events:none;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);border-radius:10px;padding:8px 18px;font-size:14px;color:rgba(255,255,255,.8);text-align:center;transition:opacity .4s;white-space:nowrap}
#overlay .author{font-size:11px;color:rgba(255,255,255,.35);margin-top:6px;text-align:center}
#pageFooter{position:absolute;bottom:8px;right:16px;z-index:100;pointer-events:none;font-size:10px;color:rgba(255,255,255,.2);text-align:right;line-height:1.4}
#statusLine{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:12px;color:rgba(255,255,255,.45);z-index:100;pointer-events:none}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="camWin"><canvas id="camCv"></canvas></div>
<div id="hud">
  <div class="hud-card hud-score" id="hScore">得分 0</div>
  <div class="hud-card hud-combo" id="hCombo">连击 0</div>
  <div class="hud-card hud-timer" id="hTimer">60s</div>
  <div class="hud-card hud-best" id="hBest">最高连击 0</div>
</div>
<div id="hintPanel" style="opacity:0"></div>
<div id="pageFooter">??????XQ<br>???????</div>
<div id="statusLine">等待启动...</div>
<div id="overlay">
  <div class="title" style="color:#FFD700">捏捏乐</div>
  <div class="sub">拇指+食指捏合，捏爆屏幕上的彩色软球<br>捏得越多，分数越高！</div>
  <div class="author">??????XQ | ???????</div>
  <button class="btn" id="btnStart">开始游戏</button>
  <div class="final-score" id="finalScore" style="display:none"></div>
  <button class="btn" id="btnRetry" style="display:none">再来一局</button>
</div>

<script>
(function(){
'use strict';
var LM={WRIST:0,THUMB_CMC:1,THUMB_MCP:2,THUMB_IP:3,THUMB_TIP:4,INDEX_MCP:5,INDEX_PIP:6,INDEX_DIP:7,INDEX_TIP:8,MIDDLE_MCP:9,MIDDLE_PIP:10,MIDDLE_DIP:11,MIDDLE_TIP:12,RING_MCP:13,RING_PIP:14,RING_DIP:15,RING_TIP:16,PINKY_MCP:17,PINKY_PIP:18,PINKY_DIP:19,PINKY_TIP:20};
var FINGER_TIPS={thumb:LM.THUMB_TIP,index:LM.INDEX_TIP,middle:LM.MIDDLE_TIP,ring:LM.RING_TIP,pinky:LM.PINKY_TIP};
function dist2D(a,b){var dx=a.x-b.x,dy=a.y-b.y;return Math.sqrt(dx*dx+dy*dy)}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}
function smooth(cur,tgt,f){return cur+(tgt-cur)*f}
class GestureBase{
  constructor(opts){var o=opts||{};this.debounceDelay=o.debounceDelay??120;this.pinchMaxDist=o.pinchMaxDist??0.12;this.pinchConfirmThreshold=o.pinchConfirmThreshold??0.5;this.swipeMinDist=o.swipeMinDist??0.08;this.swipeMaxDuration=o.swipeMaxDuration??400;this.tapMinVelocity=o.tapMinVelocity??0.03;this.velocitySmoothing=o.velocitySmoothing??0.7;this.showSkeleton=o.showSkeleton??true;this.skeletonColor=o.skeletonColor??'#00FF88';this.skeletonDotColor=o.skeletonDotColor??'#FF4466';this.interactionZone=o.interactionZone||{x:0,y:0,w:1,h:1};this._handLandmarker=null;this._video=null;this._canvas=null;this._ctx=null;this._initialized=false;this._running=false;this.landmarks=null;this.allLandmarks=[];this.allHandedness=[];this.handCount=0;this.isHandPresent=false;this.isHandInZone=false;this._palmCenter={x:0.5,y:0.5};this._palmVelocity={x:0,y:0};this._prevPalmCenter={x:0.5,y:0.5};this._palmVelocityMag=0;this._pinch={active:false,startTime:0,confirmed:false,progress:0};this._tap={detected:false,lastTapTime:0,candidate:false,candidateTime:0,indexTipY:0,indexTipPrevY:0,indexTipVelocityY:0,phase:'idle'};this._fist={active:false,startTime:0,confirmed:false};this._swipe={detected:false,direction:null,startPos:null,startTime:0,tracking:false};this._spread={initialDist:0,currentDist:0,progress:0};this._listeners={};this._eventQueue=[]}
  async init(videoEl,overlayCanvas,handLandmarker){if(this._initialized)return;this._video=videoEl;if(overlayCanvas){this._canvas=overlayCanvas;this._ctx=overlayCanvas.getContext("2d")}this._handLandmarker=handLandmarker;this._lastVideoTime=-1;if(!videoEl.srcObject)throw new Error("Video element has no stream");this._stream=videoEl.srcObject;videoEl.setAttribute("playsinline","");if(videoEl.paused)await videoEl.play();this._initialized=true;this._running=true;this._mpErrorCount=0;this._mpResultCount=0;this._startDetection();this._startLoop()}
  _startDetection(){var self=this;function detect(){if(!self._running||!self._handLandmarker){requestAnimationFrame(detect);return}if(self._video.currentTime!==self._lastVideoTime){self._lastVideoTime=self._video.currentTime;try{var r=self._handLandmarker.detectForVideo(self._video,performance.now());self._onFrame(r)}catch(e){self._mpErrorCount++}}requestAnimationFrame(detect)}requestAnimationFrame(detect)}
  stop(){this._running=false;if(this._stream){this._stream.getTracks().forEach(function(t){t.stop()});this._stream=null}if(this._handLandmarker){try{this._handLandmarker.close()}catch(_){}this._handLandmarker=null}}
  _onFrame(results){this._mpResultCount=(this._mpResultCount||0)+1;var lm=results.landmarks;if(!lm||lm.length===0){this.isHandPresent=false;this.landmarks=null;this.allLandmarks=[];this.allHandedness=[];this.handCount=0;this.isHandInZone=false;this._resetGestureStates();return}this.allLandmarks=lm;this.allHandedness=results.handedness?results.handedness.map(function(h){return h[0].categoryName}):[];this.handCount=lm.length;this.landmarks=lm[0];this.isHandPresent=true;this._updatePalmTracking();this.isHandInZone=this._checkZone();if(this.isHandInZone)this._updateGestures();if(this._ctx&&this._canvas&&this.showSkeleton)this._drawSkeleton()}
  _updatePalmTracking(){var w=this.landmarks[LM.WRIST],m=this.landmarks[LM.MIDDLE_MCP];var raw={x:(w.x+m.x)/2,y:(w.y+m.y)/2};this._palmCenter.x=smooth(this._palmCenter.x,raw.x,this.velocitySmoothing);this._palmCenter.y=smooth(this._palmCenter.y,raw.y,this.velocitySmoothing);var dx=raw.x-this._prevPalmCenter.x,dy=raw.y-this._prevPalmCenter.y;this._palmVelocity.x=smooth(this._palmVelocity.x,dx,0.5);this._palmVelocity.y=smooth(this._palmVelocity.y,dy,0.5);this._palmVelocityMag=Math.sqrt(this._palmVelocity.x**2+this._palmVelocity.y**2);this._prevPalmCenter.x=raw.x;this._prevPalmCenter.y=raw.y}
  _checkZone(){var z=this.interactionZone,p=this._palmCenter;return p.x>=z.x&&p.x<=z.x+z.w&&p.y>=z.y&&p.y<=z.y+z.h}
  _updateGestures(){var now=performance.now();this._updatePinch(now);this._updateTap(now);this._updateFist(now);this._updateSwipe(now);this._updateSpread();this._dispatchEvents()}
  _updatePinch(now){var dt=dist2D(this.landmarks[LM.THUMB_TIP],this.landmarks[LM.INDEX_TIP]);var progress=clamp(1-dt/this.pinchMaxDist,0,1);this._pinch.progress=progress;var isActive=progress>=this.pinchConfirmThreshold;if(isActive&&!this._pinch.active){this._pinch.active=true;this._pinch.startTime=now;this._pinch.confirmed=false}else if(!isActive&&this._pinch.active){if(this._pinch.confirmed)this._queueEvent('pinchend',{progress:this._pinch.progress});this._pinch.active=false;this._pinch.confirmed=false}if(this._pinch.active&&!this._pinch.confirmed&&now-this._pinch.startTime>=this.debounceDelay){this._pinch.confirmed=true;this._queueEvent('pinchstart',{progress:progress})}}
  _updateTap(now){var tip=this.landmarks[LM.INDEX_TIP];if(!tip)return;this._tap.indexTipPrevY=this._tap.indexTipY;this._tap.indexTipY=tip.y;var vY=tip.y-this._tap.indexTipPrevY;this._tap.indexTipVelocityY=smooth(this._tap.indexTipVelocityY,vY,0.6);switch(this._tap.phase){case'idle':if(this._tap.indexTipVelocityY>this.tapMinVelocity){this._tap.phase='moving-down';this._tap.candidate=true;this._tap.candidateTime=now}break;case'moving-down':if(this._tap.indexTipVelocityY<-this.tapMinVelocity*0.5){this._tap.phase='idle';if(this._tap.candidate&&now-this._tap.lastTapTime>=this.tapDebounceDelay){this._tap.detected=true;this._tap.lastTapTime=now;this._queueEvent('tap',{position:{x:tip.x,y:tip.y}})}this._tap.candidate=false}else if(now-this._tap.candidateTime>400){this._tap.phase='idle';this._tap.candidate=false}break}}
  _updateFist(now){var fingers=['index','middle','ring','pinky'];var closed=0;for(var i=0;i<fingers.length;i++){var tip=this.landmarks[FINGER_TIPS[fingers[i]]],pip=this.landmarks[FINGER_PIPS[fingers[i]]];if(tip&&pip&&tip.y>pip.y)closed++}var tt=this.landmarks[LM.THUMB_TIP],im=this.landmarks[LM.INDEX_MCP];var isFist=closed>=3&&tt&&im&&dist2D(tt,im)<0.15;if(isFist&&!this._fist.active){this._fist.active=true;this._fist.startTime=now;this._fist.confirmed=false}else if(!isFist&&this._fist.active){if(this._fist.confirmed)this._queueEvent('fistend');this._fist.active=false;this._fist.confirmed=false}if(this._fist.active&&!this._fist.confirmed&&now-this._fist.startTime>=this.debounceDelay){this._fist.confirmed=true;this._queueEvent('fiststart')}}
  _updateSwipe(now){if(this._palmVelocityMag<0.005){if(this._swipe.tracking){this._swipe.tracking=false;var disp={x:this._palmCenter.x-this._swipe.startPos.x,y:this._palmCenter.y-this._swipe.startPos.y};var dist=Math.sqrt(disp.x**2+disp.y**2),dur=now-this._swipe.startTime;if(dist>=this.swipeMinDist&&dur<=this.swipeMaxDuration){if(Math.abs(disp.x)>Math.abs(disp.y))this._swipe.direction=disp.x>0?'right':'left';else this._swipe.direction=disp.y>0?'down':'up';this._swipe.detected=true;this._queueEvent('swipe',{direction:this._swipe.direction,distance:dist})}}return}if(!this._swipe.tracking){this._swipe.tracking=true;this._swipe.startPos={x:this._palmCenter.x,y:this._palmCenter.y};this._swipe.startTime=now;this._swipe.direction=null;this._swipe.detected=false}}
  _updateSpread(){var iTip=this.landmarks[LM.INDEX_TIP],mTip=this.landmarks[LM.MIDDLE_TIP];if(!iTip||!mTip)return;var dist=dist2D(iTip,mTip);if(this._spread.initialDist===0)this._spread.initialDist=dist;this._spread.currentDist=dist;this._spread.progress=this._spread.initialDist>0?dist/this._spread.initialDist:1}
  _resetGestureStates(){if(this._pinch.confirmed)this._queueEvent('pinchend');if(this._fist.confirmed)this._queueEvent('fistend');this._pinch={active:false,startTime:0,confirmed:false,progress:0};this._fist={active:false,startTime:0,confirmed:false};this._tap={detected:false,lastTapTime:this._tap.lastTapTime,candidate:false,candidateTime:0,indexTipY:0,indexTipPrevY:0,indexTipVelocityY:0,phase:'idle'};this._swipe={detected:false,direction:null,startPos:null,startTime:0,tracking:false};this._spread={initialDist:0,currentDist:0,progress:0}}
  _queueEvent(name,data){this._eventQueue.push({name:name,data:data||{}})}
  _dispatchEvents(){for(var i=0;i<this._eventQueue.length;i++){var ev=this._eventQueue[i];if(this._listeners[ev.name])for(var j=0;j<this._listeners[ev.name].length;j++)try{this._listeners[ev.name][j](ev.data)}catch(e){}}this._eventQueue.length=0}
  getLandmark(idx){return this.landmarks?this.landmarks[idx]:null}
  getFingertip(finger){var idx=FINGER_TIPS[finger];return idx!==undefined?this.getLandmark(idx):null}
  getHandLandmarks(hi){return(this.allLandmarks&&hi<this.allLandmarks.length)?this.allLandmarks[hi]:null}
  getHandHandedness(hi){return(this.allHandedness&&hi<this.allHandedness.length)?this.allHandedness[hi]:null}
  pinchProgress(){return this._pinch.progress}
  isPinching(){return this._pinch.confirmed}
  isTapping(){if(this._tap.detected){this._tap.detected=false;return true}return false}
  isFist(){return this._fist.confirmed}
  palmCenter(){return{x:this._palmCenter.x,y:this._palmCenter.y}}
  palmVelocity(){return{x:this._palmVelocity.x,y:this._palmVelocity.y,mag:this._palmVelocityMag}}
  isInsideZone(){return this.isHandInZone}
  on(event,cb){if(!this._listeners[event])this._listeners[event]=[];this._listeners[event].push(cb)}
  off(event,cb){var list=this._listeners[event];if(list){var idx=list.indexOf(cb);if(idx>=0)list.splice(idx,1)}}
  _drawSkeleton(){var ctx=this._ctx,cw=this._canvas.width,ch=this._canvas.height;ctx.clearRect(0,0,cw,ch);var z=this.interactionZone;ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;ctx.setLineDash([4,3]);ctx.strokeRect(z.x*cw,z.y*ch,z.w*cw,z.h*ch);ctx.setLineDash([]);for(var hi=0;hi<this.allLandmarks.length;hi++){var handLm=this.allLandmarks[hi];if(!handLm)continue;var conns=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[5,9],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20]];ctx.strokeStyle=this.skeletonColor;ctx.lineWidth=1.5;ctx.lineCap='round';for(var ci=0;ci<conns.length;ci++){var pa=handLm[conns[ci][0]],pb=handLm[conns[ci][1]];if(!pa||!pb)continue;ctx.beginPath();ctx.moveTo(pa.x*cw,pa.y*ch);ctx.lineTo(pb.x*cw,pb.y*ch);ctx.stroke()}for(var li=0;li<21;li++){var p=handLm[li];if(!p)continue;ctx.beginPath();ctx.arc(p.x*cw,p.y*ch,2.5,0,Math.PI*2);ctx.fillStyle=(li===8||li===4)?this.skeletonDotColor:'rgba(255,255,255,0.6)';ctx.fill()}}ctx.fillStyle=this.isHandInZone?'#00FF88':'#FF4466';ctx.beginPath();ctx.arc(cw-12,12,7,0,Math.PI*2);ctx.fill()}
  _startLoop(){var self=this;function tick(){if(!self._running)return;self._emit('frame',{landmarks:self.landmarks,isHandPresent:self.isHandPresent,pinchProgress:self.pinchProgress(),isPinching:self.isPinching(),palmCenter:self.palmCenter()});requestAnimationFrame(tick)}requestAnimationFrame(tick)}
  _emit(name,data){if(this._listeners[name])for(var i=0;i<this._listeners[name].length;i++)try{this._listeners[name][i](data)}catch(e){}}
}
window.GestureBase=GestureBase;
})();
</script>

<script type="module">
import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs";

var gameCv=document.getElementById("gameCanvas"),gameCtx=gameCv.getContext("2d");
var camCv=document.getElementById("camCv"),camCtx=camCv.getContext("2d");
var overlay=document.getElementById("overlay"),btnStart=document.getElementById("btnStart"),btnRetry=document.getElementById("btnRetry");
var hScore=document.getElementById("hScore"),hCombo=document.getElementById("hCombo"),hTimer=document.getElementById("hTimer"),hBest=document.getElementById("hBest");
var statusLine=document.getElementById("statusLine"),finalScore=document.getElementById("finalScore"),hintPanel=document.getElementById("hintPanel");

var audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function unlockAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended'){var buf=audioCtx.createBuffer(1,1,22050);var src=audioCtx.createBufferSource();src.buffer=buf;src.connect(audioCtx.destination);src.start(0);audioCtx.resume()}}
function playPop(){try{if(!audioCtx)return;if(audioCtx.state==='suspended')audioCtx.resume().catch(function(){});var n=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.setValueAtTime(600,n);o.frequency.exponentialRampToValueAtTime(200,n+0.15);g.gain.setValueAtTime(0.3,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.2);o.connect(g);g.connect(audioCtx.destination);o.start(n);o.stop(n+0.25)}catch(e){}}
function playComboSound(lv){try{if(!audioCtx)return;if(audioCtx.state==='suspended')audioCtx.resume().catch(function(){});var n=audioCtx.currentTime,f=400+lv*80,o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='triangle';o.frequency.setValueAtTime(f,n);o.frequency.exponentialRampToValueAtTime(f*1.5,n+0.1);g.gain.setValueAtTime(0.2,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.3);o.connect(g);g.connect(audioCtx.destination);o.start(n);o.stop(n+0.35)}catch(e){}}

var balls=[],particles=[],floatingTexts=[];
var score=0,combo=0,maxCombo=0,gameTime=60,gameRunning=false,gameStartTs=0,lastTime=0;
var gesture=null,hl=null,videoEl=null,prevPinch=false;
var PINCH_HIT_RADIUS=75,MAX_BALLS=7;
var BALL_COLORS=['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF8C42','#C77DFF','#FF85A1','#00D2FF','#FFB830','#48E5C2'];
var cursorX=-100,cursorY=-100,cursorVisible=false,cursorSquish=0,hintTimer=0;


function resize(){var dpr=window.devicePixelRatio||1,w=window.innerWidth,h=window.innerHeight;gameCv.width=w*dpr;gameCv.height=h*dpr;gameCv.style.width=w+'px';gameCv.style.height=h+'px';camCv.width=200;camCv.height=150}
window.addEventListener('resize',resize);resize();

function spawnBall(){if(balls.filter(function(b){return b.alive}).length>=MAX_BALLS)return;var r=28+Math.random()*28,pad=r+20,x=pad+Math.random()*(window.innerWidth-2*pad),y=pad+Math.random()*(window.innerHeight*0.7-pad),ang=Math.random()*Math.PI*2,spd=0.3+Math.random()*0.7;balls.push({x:x,y:y,r:r,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,color:BALL_COLORS[Math.floor(Math.random()*BALL_COLORS.length)],alive:true})}
function popBall(b){b.alive=false;for(var i=0;i<22;i++){var ang=Math.random()*Math.PI*2,spd=2+Math.random()*6;particles.push({x:b.x,y:b.y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-1.5,life:500,maxLife:500,color:b.color,size:3+Math.random()*7})}for(var i=0;i<8;i++){var ang=Math.random()*Math.PI*2;particles.push({x:b.x,y:b.y,vx:Math.cos(ang)*1.5,vy:Math.sin(ang)*1.5-0.5,life:400,maxLife:400,color:'rgba(255,255,255,0.8)',size:2+Math.random()*3})}}
function hitRadius(b){return PINCH_HIT_RADIUS+b.r*0.3}

function update(dt){if(!gameRunning)return;var elapsed=(performance.now()-gameStartTs)/1000,remaining=Math.max(0,Math.ceil(gameTime-elapsed));hTimer.textContent=remaining+'s';if(elapsed>=gameTime){endGame();return}
  if(balls.filter(function(b){return b.alive}).length<MAX_BALLS&&Math.random()<0.018)spawnBall();
  var W=window.innerWidth,H=window.innerHeight;
  for(var i=0;i<balls.length;i++){var b=balls[i];b.x+=b.vx*dt/16;b.y+=b.vy*dt/16;if(b.x-b.r<0){b.x=b.r;b.vx*=-1}if(b.x+b.r>W){b.x=W-b.r;b.vx*=-1}if(b.y-b.r<0){b.y=b.r;b.vy*=-1}if(b.y+b.r>H){b.y=H-b.r;b.vy*=-1}}
  cursorSquish*=0.8;
  if(gesture&&cursorVisible){var pp=gesture.pinchProgress(),pinchNow=pp>0.5;if(pinchNow&&!prevPinch){var hitAny=false;for(var i=balls.length-1;i>=0;i--){var b=balls[i];var dx=cursorX-b.x,dy=cursorY-b.y;if(Math.sqrt(dx*dx+dy*dy)<hitRadius(b)){popBall(b);combo++;score+=10*Math.max(1,Math.floor(combo/5)+1);if(combo>maxCombo)maxCombo=combo;var bs=balls.indexOf(b);if(bs>=0)balls.splice(bs,1);cursorSquish=1;if(combo%5===0)playComboSound(Math.floor(combo/5));else playPop();hScore.textContent='得分 '+score;hCombo.textContent='连击 '+combo;hBest.textContent='最高连击 '+maxCombo;floatingTexts.push({x:b.x,y:b.y-20,text:'+'+10*Math.max(1,Math.floor(combo/5)+1),color:'#FFD700',life:600,maxLife:600});hitAny=true;break}}if(!hitAny){combo=0;hCombo.textContent='连击 0'}}prevPinch=pinchNow}else{prevPinch=false}
  if(balls.length<3)spawnBall();
  for(var i=particles.length-1;i>=0;i--){var p=particles[i];p.x+=p.vx*dt/16;p.y+=p.vy*dt/16;p.vy+=0.1;p.life-=dt;if(p.life<=0)particles.splice(i,1)}
  for(var i=floatingTexts.length-1;i>=0;i--){var ft=floatingTexts[i];ft.y-=1.5*dt/16;ft.life-=dt;if(ft.life<=0)floatingTexts.splice(i,1)}
}

function render(){var ctx=gameCtx,cw=gameCv.width,ch=gameCv.height,W=window.innerWidth,H=window.innerHeight,dpr=window.devicePixelRatio||1;ctx.clearRect(0,0,cw,ch);var grad=ctx.createRadialGradient(W/2*dpr,H/2*dpr,0,W/2*dpr,H/2*dpr,Math.max(W,H)*dpr);grad.addColorStop(0,'#141428');grad.addColorStop(1,'#0a0a12');ctx.fillStyle=grad;ctx.fillRect(0,0,cw,ch);ctx.fillStyle='rgba(255,255,255,0.025)';for(var gx=30*dpr;gx<cw;gx+=60*dpr)for(var gy=30*dpr;gy<ch;gy+=60*dpr){ctx.beginPath();ctx.arc(gx,gy,1.5,0,Math.PI*2);ctx.fill()}for(var i=0;i<balls.length;i++)drawBall(ctx,balls[i],dpr);for(var i=0;i<particles.length;i++){var p=particles[i],a=p.life/p.maxLife;ctx.globalAlpha=a;ctx.fillStyle=p.color;ctx.fillRect(p.x*dpr-p.size/2,p.y*dpr-p.size/2,p.size,p.size)}ctx.globalAlpha=1;for(var i=0;i<floatingTexts.length;i++){var ft=floatingTexts[i],a=Math.min(1,ft.life/200);ctx.globalAlpha=a;ctx.fillStyle=ft.color;ctx.font='bold 18px -apple-system,sans-serif';ctx.textAlign='center';ctx.fillText(ft.text,ft.x*dpr,ft.y*dpr)}ctx.globalAlpha=1;if(cursorVisible){var cr=16+cursorSquish*10;ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(cursorX*dpr,cursorY*dpr,cr,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(255,255,255,0.9)';ctx.beginPath();ctx.arc(cursorX*dpr,cursorY*dpr,4,0,Math.PI*2);ctx.fill();var gg=ctx.createRadialGradient(cursorX*dpr,cursorY*dpr,0,cursorX*dpr,cursorY*dpr,cr*1.8);gg.addColorStop(0,'rgba(0,255,136,0.25)');gg.addColorStop(1,'rgba(0,255,136,0)');ctx.fillStyle=gg;ctx.beginPath();ctx.arc(cursorX*dpr,cursorY*dpr,cr*1.8,0,Math.PI*2);ctx.fill()}}

function drawBall(ctx,b,dpr){var x=b.x*dpr,y=b.y*dpr,r=b.r*dpr;ctx.save();ctx.translate(x,y);var grad=ctx.createRadialGradient(-r*0.25,-r*0.35,r*0.1,0,0,r);grad.addColorStop(0,'rgba(255,255,255,0.4)');grad.addColorStop(0.4,b.color);grad.addColorStop(1,'rgba(0,0,0,0.2)');ctx.fillStyle=grad;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,0.25)';ctx.beginPath();ctx.ellipse(-r*0.25,-r*0.3,r*0.35,r*0.22,0.3,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,0.55)';ctx.beginPath();ctx.arc(-r*0.28,-r*0.32,r*0.1,0,Math.PI*2);ctx.fill();ctx.restore()}

function drawCamera(){if(!videoEl||videoEl.videoWidth===0)return;camCtx.save();camCtx.clearRect(0,0,camCv.width,camCv.height);camCtx.scale(-1,1);camCtx.drawImage(videoEl,-camCv.width,0,camCv.width,camCv.height);var allLm=gesture?gesture.allLandmarks:null;if(allLm&&allLm.length>0)for(var hi=0;hi<allLm.length;hi++){var lm=allLm[hi];if(!lm)continue;var conns=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[0,17],[17,18],[18,19],[19,20]];camCtx.strokeStyle='#00FF88';camCtx.lineWidth=1;for(var ci=0;ci<conns.length;ci++){var a=lm[conns[ci][0]],b=lm[conns[ci][1]];if(!a||!b)continue;camCtx.beginPath();camCtx.moveTo((a.x-1)*camCv.width,a.y*camCv.height);camCtx.lineTo((b.x-1)*camCv.width,b.y*camCv.height);camCtx.stroke()}for(var li=0;li<21;li++){var p=lm[li];if(!p)continue;camCtx.beginPath();camCtx.arc((p.x-1)*camCv.width,p.y*camCv.height,2,0,Math.PI*2);camCtx.fillStyle=(li===8||li===4)?'#FF4466':'#FFF';camCtx.fill()}}camCtx.restore()}

function updateCursor(){if(!gesture||!gesture.isHandPresent){cursorVisible=false;return}var tip=gesture.getFingertip('index');if(!tip){cursorVisible=false;return}cursorX=(1-tip.x)*window.innerWidth;cursorY=tip.y*window.innerHeight;cursorVisible=true}

function startGame(){score=0;combo=0;maxCombo=0;gameTime=60;balls=[];particles=[];floatingTexts=[];gameRunning=true;gameStartTs=performance.now();prevPinch=false;hScore.textContent='得分 0';hCombo.textContent='连击 0';hTimer.textContent='60s';hBest.textContent='最高连击 0';for(var i=0;i<5;i++)spawnBall();overlay.classList.add('hidden');finalScore.style.display='none';btnRetry.style.display='none';btnStart.style.display='none';statusLine.textContent='捏！捏！捏！';showHint('????????????');hintTimer=0;unlockAudio();}
function endGame(){gameRunning=false;balls=[];particles=[];floatingTexts=[];overlay.classList.remove('hidden');finalScore.style.display='block';btnRetry.style.display='inline-block';btnStart.style.display='none';finalScore.textContent='最终得分: '+score;overlay.querySelector('.sub').textContent='最高连击: '+maxCombo+' | 总共得分: '+score;statusLine.textContent='游戏结束'}

btnStart.addEventListener('click',async function(){btnStart.disabled=true;btnStart.textContent='启动中...';unlockAudio();try{await initGame();startGame()}catch(err){statusLine.textContent='错误: '+err.message;btnStart.disabled=false;btnStart.textContent='开始游戏'}});
btnRetry.addEventListener('click',function(){overlay.classList.add('hidden');startGame()});

async function initGame(){if(gesture)return;statusLine.textContent='启动摄像头...';var stream=await navigator.mediaDevices.getUserMedia({video:{width:320,height:240,facingMode:'user'},audio:false});videoEl=document.createElement('video');videoEl.playsinline=true;videoEl.srcObject=stream;document.body.appendChild(videoEl);videoEl.style.cssText='position:absolute;top:-9999px;left:0;width:320px;height:240px';await videoEl.play();var w=0;while(videoEl.videoWidth===0&&w<50){await new Promise(function(r){setTimeout(r,100)});w++}if(videoEl.videoWidth===0)throw new Error('摄像头未就绪');camCv.width=videoEl.videoWidth;camCv.height=videoEl.videoHeight;statusLine.textContent='加载手部模型...';var vision=await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm');hl=await HandLandmarker.createFromOptions(vision,{baseOptions:{modelAssetPath:'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task',delegate:'GPU'},runningMode:'VIDEO',numHands:1});statusLine.textContent='初始化手势识别...';gesture=new GestureBase({interactionZone:{x:0,y:0,w:1,h:1},showSkeleton:true,debounceDelay:120,pinchConfirmThreshold:0.5});await gesture.init(videoEl,null,hl);statusLine.textContent='就绪！捏捏看吧~';initAudio()}


function updateHints(dt){if(!gameRunning){if(hintPanel)hintPanel.style.opacity='0';return}
  hintTimer+=dt;
  if(!gesture||!gesture.isHandPresent){showHint('????????????');return}
  if(!cursorVisible){showHint('????????...');return}
  var pp=gesture.pinchProgress();
  if(pp>0.5){showHint('????');hintTimer=0}
  else if(pp>0.25){showHint('???????????');hintTimer=0}
  else if(hintTimer>4000){var tips=['??????? ????','????????','???? ????'];showHint(tips[Math.floor(Math.random()*tips.length)]);hintTimer=0}
  else if(hintTimer<100){}else{showHint('???? ????')}
}
function showHint(text){if(!hintPanel)return;if(!text||text.length===0){hintPanel.style.opacity='0';return}hintPanel.style.opacity='1';hintPanel.textContent=text}
function gameLoop(now){requestAnimationFrame(gameLoop);var dt=lastTime?Math.min(now-lastTime,40):16.67;lastTime=now;updateCursor();update(dt);render();drawCamera();updateHints(dt)}
requestAnimationFrame(gameLoop);

window.addEventListener('keydown',function(e){if(e.code==='Space'&&gameRunning&&cursorVisible){e.preventDefault();var hit=false;for(var i=balls.length-1;i>=0;i--){var b=balls[i];var dx=cursorX-b.x,dy=cursorY-b.y;if(Math.sqrt(dx*dx+dy*dy)<hitRadius(b)){popBall(b);combo++;score+=10*Math.max(1,Math.floor(combo/5)+1);if(combo>maxCombo)maxCombo=combo;var bs=balls.indexOf(b);if(bs>=0)balls.splice(bs,1);cursorSquish=1;playPop();hScore.textContent='得分 '+score;hCombo.textContent='连击 '+combo;hBest.textContent='最高连击 '+maxCombo;floatingTexts.push({x:b.x,y:b.y-20,text:'+'+10*Math.max(1,Math.floor(combo/5)+1),color:'#FFD700',life:600,maxLife:600});hit=true;break}}if(!hit){combo=0;hCombo.textContent='连击 0'}}});
</script>
